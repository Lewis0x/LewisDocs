name: Deploy to Cloudflare Pages

# 触发：默认分支 push。GitHub Pages 已停用（pages.yml 加了 if:false）。
# 需要的 GitHub Secrets：
#   - CLOUDFLARE_API_TOKEN  (Account › Cloudflare Pages › Edit)
#   - CLOUDFLARE_ACCOUNT_ID (Cloudflare 仪表板右侧栏 Account ID)
# 项目名 lewisdocs（CF Pages 要求全小写；首次部署前由下面的 project create 步骤建立）。
# 公开上线地址：https://lewisdocs.cadapi.dev/  （CF Pages 自定义域名，绑定到 lewisdocs.pages.dev）

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # 让 npm/npx 在 runner 上自动接受软件包安装提示。GitHub Actions 升 npm 11+ 后未缓存
      # wrangler 4.x 时会触发交互提示，叠加全局 install 步骤兜底。
      npm_config_yes: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # lastUpdated 需要完整 git 历史

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install npm dependencies
        run: npm ci

      - name: Cache VitePress build artifacts
        uses: actions/cache@v4
        with:
          path: docs/.vitepress/cache
          key: ${{ runner.os }}-vitepress-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('source/**/*.md', 'docs/**/*.md', 'docs/.vitepress/**/*.{ts,js,css}') }}
          restore-keys: |
            ${{ runner.os }}-vitepress-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-vitepress-

      - name: Prepare content (import + rewrite links)
        run: npm run prepare-content

      - name: Build (vitepress + watermark)
        run: npm run build

      - name: Upload watermark manifest as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watermark-manifest-${{ github.sha }}
          path: docs/.vitepress/dist/_watermark-manifest.json
          retention-days: 90
          if-no-files-found: warn

      - name: Strip watermark manifest from public dist
        # manifest 是私密映射表，绝不能跟着 deploy 上线
        run: rm -f docs/.vitepress/dist/_watermark-manifest.json

      # 全局安装 wrangler，让 cloudflare/wrangler-action 的 pre-flight `npx --no-install
      # wrangler --version` 检查在 npm 11+ 上能立即命中（不再触发 "missing packages" 报错）。
      - name: Pre-install wrangler globally
        run: npm install -g wrangler@3.90.0

      # 仅手动触发时尝试创建 CF Pages 项目（首次部署 / 重建场景）。
      # 项目存在时该 API 返回 409 → step 标失败但被 continue-on-error 兜住。
      # 平时 push 不跑此步，run 状态保持纯净（彻底消除 gh run watch 的误导 X）。
      - name: Ensure Cloudflare Pages project exists
        if: github.event_name == 'workflow_dispatch'
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.90.0'
          command: pages project create lewisdocs --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3.90.0'
          command: pages deploy docs/.vitepress/dist --project-name=lewisdocs --branch=main --commit-dirty=true
