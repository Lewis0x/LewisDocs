name: Deploy VitePress site to GitHub Pages (DISABLED)

# 已主推 Cloudflare Pages（见 cloudflare-pages.yml）；本 workflow 留作回退预案。
# 启用回退步骤：
#   1. 把下面 `if: false` 改成 `if: true`
#   2. 把 docs/.vitepress/config.ts 的 base 改回 '/LewisDocs/'
#   3. 在 cloudflare-pages.yml 加 `if: false` 关掉
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署；新提交把队列里的旧任务挤掉
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: false   # ← 已停用，主推 Cloudflare Pages（见 cloudflare-pages.yml）
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # lastUpdated 需要 git 历史

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install npm dependencies
        run: npm ci

      - name: Cache VitePress build artifacts
        uses: actions/cache@v4
        with:
          path: docs/.vitepress/cache
          key: ${{ runner.os }}-vitepress-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('source/**/*.md', 'docs/**/*.md', '.vitepress/**/*.{ts,js,css}') }}
          restore-keys: |
            ${{ runner.os }}-vitepress-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-vitepress-

      - name: Prepare content (import + rewrite links)
        run: npm run prepare-content

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    if: false   # ← 已停用，主推 Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
